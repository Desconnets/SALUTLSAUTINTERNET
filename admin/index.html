<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Salut Salut Internet</title>
</head>
<body>
  <!-- Decap CMS doit être chargé EN PREMIER -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <!-- Netlify Identity widget chargé APRÈS Decap -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    console.log('[SSI:admin] Script Identity chargé, window.netlifyIdentity =', typeof window.netlifyIdentity);
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", function(user) {
        var hash = window.location.hash || "";
        console.log('[SSI:admin] init() → user =', user, 'hash =', hash);

        // Si on arrive ici via un lien d'invitation ou de reset mot de passe,
        // on ouvre la modale Identity pour terminer le flux (choix / reset du MDP).
        if (hash.indexOf("invite_token=") !== -1 || hash.indexOf("recovery_token=") !== -1) {
          console.log('[SSI:admin] Token détecté dans le hash, appel de netlifyIdentity.open()');
          window.netlifyIdentity.open();
        }

        if (user) {
          console.log('[SSI:admin] User déjà présent à l’init (session active).');
        } else {
          console.log('[SSI:admin] Pas de user à l’init, écran de login Decap attendu.');
        }

        // Après un login via la modale Identity, on recharge /admin UNE SEULE FOIS
        // pour que Decap affiche l’interface CMS (sans boucle infinie).
        window.netlifyIdentity.on("login", function() {
          console.log('[SSI:admin] Event login reçu.');
          try {
            if (sessionStorage.getItem('ssi_admin_reloaded_after_login') === '1') {
              console.log('[SSI:admin] Reload déjà fait après login, on ne refait rien.');
              return;
            }
            console.log('[SSI:admin] Premier login → on marque le reload et on recharge /admin/');
            sessionStorage.setItem('ssi_admin_reloaded_after_login', '1');
          } catch (e) {
            console.warn('[SSI:admin] sessionStorage non disponible ou erreur :', e);
          }
          document.location.href = '/admin/';
        });

        // Quand on se déconnecte, on recharge /admin et on réinitialise le flag,
        // pour revenir proprement sur l'écran de login.
        window.netlifyIdentity.on("logout", function() {
          console.log('[SSI:admin] Événement logout reçu → reset flag + reload /admin/');
          try {
            sessionStorage.removeItem('ssi_admin_reloaded_after_login');
          } catch (e) {
            console.warn('[SSI:admin] Erreur en nettoyant le flag de sessionStorage :', e);
          }
          document.location.href = "/admin/";
        });
      });
    } else {
      console.warn('[SSI:admin] window.netlifyIdentity est undefined (script non chargé ?)');
    }
  </script>
</body>
</html>
