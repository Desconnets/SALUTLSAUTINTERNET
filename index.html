<body>
  <!-- Popup événement (affiche prochaine soirée) -->
  <div class="event-popup event-popup--hidden" data-event-url="">
    <div class="event-popup-backdrop" data-popup-close></div>
    <div class="event-popup-window">
      <button

        aria-label="Fermer l'annonce de l'événement"
        data-popup-close
      >
        ✕
      </button>
      <img
        src="assets/img/event_bar_JV.jpeg"
        alt="Soirée années 2000 — Un bar et jivay, samedi 11 avril 21h — Salut Salut Internet"
        class="event-popup-image"
      >
    </div>
  </div>

  <!-- Logo texte simple (CSS 3D uniquement). Pour tester à nouveau un logo WebGL,
       on pourra réajouter une classe et des scripts plus tard. -->
  <header class="site-header">
    <!-- Logo texte initial (fallback accessible / version sans 3D) -->
    <h1 class="site-logo" data-text="salut salut INTERNET">
      <span class="logo-salut">salut salut</span>
      <span class="logo-internet">INTERNET</span>
    </h1>
    <!-- Lien Instagram -->
    <a
      class="social-link social-link--instagram"
      href="https://www.instagram.com/salut_salut_internet/"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Ouvrir Instagram Salut Salut Internet"
    >
      <span class="visually-hidden">Instagram</span>
    </a>
    <!-- Toggle thème clair/sombre -->
    <button class="theme-toggle" type="button" data-theme-toggle aria-pressed="false">
      Mode clair
    </button>
    <!-- Conteneur anciennement utilisé pour le logo 3D WebGL, conservé au cas où.
         Sans script associé, il est neutre. -->
    <!-- <div id="logo-3d-root"></div> -->
    <!-- Logo SVG (conservé au cas où) : décommenter pour afficher à la place du logo typo
    <img class="site-logo-img" src="assets/svg/ssi-classic-b%26w.svg" alt="Salut Salut Internet">
    -->
  </header>
  <div class="screen-frame">
    <div class="screen-titlebar" aria-hidden="true">
      <div class="window-controls">
        <span class="window-btn window-btn--close" aria-hidden="true"></span>
        <span class="window-btn window-btn--min" aria-hidden="true"></span>
        <span class="window-btn window-btn--max" aria-hidden="true"></span>
      </div>
      <div class="ticker-viewport">
        <div class="ticker-track">
          <span class="ticker-text">Des événements, du contenu en ligne et la bonne vibe des années 2000 ! ★ </span>
          <span class="ticker-text">Des événements, du contenu en ligne et la bonne vibe des années 2000 ! ★ </span>
        </div>
      </div>
    </div>
    <div class="screen-body">
      <aside class="screen-info">
        <nav class="screen-nav" aria-label="Catégories"></nav>
        <div class="screen-info-content">Chargement…</div>
      </aside>
    </div>
  </div>
  <footer class="site-footer">
    <span class="contact-hint"> >>Nous contacter<< </span>
  </footer>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    console.log('[SSI:index] Script Identity chargé, window.netlifyIdentity =', typeof window.netlifyIdentity);
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", function(user) {
        var hash = window.location.hash || "";
        console.log('[SSI:index] init() → user =', user, 'hash =', hash);

        if (hash.indexOf("invite_token=") !== -1 || hash.indexOf("recovery_token=") !== -1) {
          console.log('[SSI:index] Token détecté dans le hash → redirect vers /admin/ avec le même hash');
          document.location.href = "/admin/" + hash;
          return;
        }

        // Si déjà connecté à l'init (ex. après clic sur lien d'invitation), redirect direct
        if (user) {
          console.log('[SSI:index] user présent à l’init → redirect /admin/');
          document.location.href = "/admin/";
        } else {
          console.log('[SSI:index] Pas de user à l’init, on attend un login…');
          window.netlifyIdentity.on("login", function() {
            console.log('[SSI:index] Événement login reçu → redirect /admin/');
            document.location.href = "/admin/";
          });
        }
      });

      console.log('[SSI:index] Appel de netlifyIdentity.init()');
      window.netlifyIdentity.init();
    } else {
      console.warn('[SSI:index] window.netlifyIdentity est undefined (script non chargé ?)');
    }
  </script>
  <script>
    // Popup événement : affiche l'affiche au chargement, clic pour fermer.
    (function () {
      const popup = document.querySelector('.event-popup');
      if (!popup) return;

      const closeEls = popup.querySelectorAll('[data-popup-close]');
      function hidePopup() {
        popup.classList.add('event-popup--hidden');
      }
      closeEls.forEach((el) => {
        el.addEventListener('click', hidePopup);
      });

      const img = popup.querySelector('.event-popup-image');
      const eventUrl = popup.getAttribute('data-event-url') || '';
      if (img && eventUrl) {
        img.style.cursor = 'pointer';
        img.addEventListener('click', function () {
          window.open(eventUrl, '_blank', 'noopener');
          hidePopup();
        });
      } else if (img) {
        // Par défaut : clic sur l'affiche = fermer simplement la popup
        img.addEventListener('click', hidePopup);
      }

      // On affiche la popup après un délai, pour laisser l'animation d'entrée
      // se jouer d'abord et créer un effet "surprise".
      const POPUP_DELAY_MS = 6000; // ~6 secondes après le chargement initial
      setTimeout(function () {
        if (!popup.classList.contains('event-popup--hidden')) return;
        popup.classList.remove('event-popup--hidden');
      }, POPUP_DELAY_MS);
    })();
  </script>
  <script>
    // Copier le mail de contact au clic sur "Nous contacter"
    (function () {
      const EMAIL = 'contact@salutsalutinternet.com';
      const hint = document.querySelector('.contact-hint');
      if (!hint) return;

      const originalText = hint.textContent;
      let resetTimeout = null;

      function setTextOnce(message) {
        hint.textContent = message;
        if (resetTimeout) clearTimeout(resetTimeout);
        resetTimeout = setTimeout(function () {
          hint.textContent = originalText;
        }, 3000);
      }

      function copyEmail() {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(EMAIL).then(function () {
            setTextOnce('Copié ! Il ne reste plus qu’à coller');
          }).catch(function () {
            setTextOnce('Copié ! Il ne reste plus qu’à coller');
          });
        } else {
          // Fallback legacy
          const textarea = document.createElement('textarea');
          textarea.value = EMAIL;
          textarea.style.position = 'fixed';
          textarea.style.opacity = '0';
          document.body.appendChild(textarea);
          textarea.focus();
          textarea.select();
          try {
            document.execCommand('copy');
          } catch (e) {
            // silencieux
          }
          document.body.removeChild(textarea);
          setTextOnce('Copié ! Il ne reste plus qu’à coller');
        }
      }

      hint.addEventListener('click', copyEmail);
    })();
  </script>
  <script>
    (function () {
      const baseTitle = 'Salut Salut Internet ★ 2000s vibe';
      let i = 0;
      setInterval(function () {
        document.title = baseTitle.slice(i) + ' ' + baseTitle.slice(0, i);
        i = (i + 1) % baseTitle.length;
      }, 300);
    })();
  </script>
</body>
