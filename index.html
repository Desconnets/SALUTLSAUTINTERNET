<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salut Salut Internet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bowlby+One+SC&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Logo texte simple (CSS 3D uniquement). Pour tester à nouveau un logo WebGL,
       on pourra réajouter une classe et des scripts plus tard. -->
  <header class="site-header">
    <!-- Logo texte initial (fallback accessible / version sans 3D) -->
    <h1 class="site-logo" data-text="salut salut INTERNET">
      <span class="logo-salut">salut salut</span>
      <span class="logo-internet">INTERNET</span>
    </h1>
    <!-- Toggle thème clair/sombre -->
    <button class="theme-toggle" type="button" data-theme-toggle aria-pressed="false">
      Mode clair
    </button>
    <!-- Conteneur anciennement utilisé pour le logo 3D WebGL, conservé au cas où.
         Sans script associé, il est neutre. -->
    <!-- <div id="logo-3d-root"></div> -->
    <!-- Logo SVG (conservé au cas où) : décommenter pour afficher à la place du logo typo
    <img class="site-logo-img" src="assets/svg/ssi-classic-b%26w.svg" alt="Salut Salut Internet">
    -->
  </header>
  <div class="screen-frame">
    <div class="screen-titlebar" aria-hidden="true">
      <div class="window-controls">
        <span class="window-btn window-btn--close" aria-hidden="true"></span>
        <span class="window-btn window-btn--min" aria-hidden="true"></span>
        <span class="window-btn window-btn--max" aria-hidden="true"></span>
      </div>
      <div class="ticker-viewport">
        <div class="ticker-track">
          <span class="ticker-text">Des événements, du contenu en ligne et la bonne vibe des années 2000 ! ★ </span>
          <span class="ticker-text">Des événements, du contenu en ligne et la bonne vibe des années 2000 ! ★ </span>
        </div>
      </div>
    </div>
    <div class="screen-body">
      <aside class="screen-info">Chargement…</aside>
      <nav class="screen-controls"></nav>
    </div>
  </div>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    console.log('[SSI:index] Script Identity chargé, window.netlifyIdentity =', typeof window.netlifyIdentity);
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", function(user) {
        var hash = window.location.hash || "";
        console.log('[SSI:index] init() → user =', user, 'hash =', hash);

        if (hash.indexOf("invite_token=") !== -1 || hash.indexOf("recovery_token=") !== -1) {
          console.log('[SSI:index] Token détecté dans le hash, appel de netlifyIdentity.open()');
          window.netlifyIdentity.open();
        }

        // Si déjà connecté à l'init (ex. après clic sur lien d'invitation), redirect direct
        if (user) {
          console.log('[SSI:index] user présent à l’init → redirect /admin/');
          document.location.href = "/admin/";
        } else {
          console.log('[SSI:index] Pas de user à l’init, on attend un login…');
          window.netlifyIdentity.on("login", function() {
            console.log('[SSI:index] Événement login reçu → redirect /admin/');
            document.location.href = "/admin/";
          });
        }
      });

      console.log('[SSI:index] Appel de netlifyIdentity.init()');
      window.netlifyIdentity.init();
    } else {
      console.warn('[SSI:index] window.netlifyIdentity est undefined (script non chargé ?)');
    }
  </script>
</body>
</html>
